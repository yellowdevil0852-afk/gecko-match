<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gecko Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gecko Match 🦎</h1>
        <p>Match the healthy gecko habits!</p>
        <div class="score-container">
            <label for="difficulty">Difficulty: </label>
            <select id="difficulty">
                <option value="low">Low (6 Pairs)</option>
                <option value="medium" selected>Medium (12 Pairs)</option>
                <option value="hard">Hard (18 Pairs)</option>
            </select>
            
            <span>Score: <strong id="score">0</strong></span>
            <span>Flips: <strong id="flip-count">0</strong></span> <button id="restart-btn">Restart Game</button>
        </div>
    </header>

    <main class="game-container">
        <div class="game-grid" id="game-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
